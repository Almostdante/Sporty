[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --html=reports/report.html
    --self-contained-html
markers =
    ui: UI/E2E tests requiring a browser (Selenium)
    api: API-level tests using requests
    smoke: Quick sanity checks
